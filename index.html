<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="pictuer/2aikon.png">
    <title>Pikva</title>
  </head>

  <body>
    <div class="app">
    <aside class="tool">
      
      <h1 class="title" >Pikva</h1>
      <div id = "shape">
      <button id="rect"  type="button">四角形を追加</button>
      </div>
      <div id = "shape circle">
      <button id="circle" type="button">円を追加</button>
      </div>
      <div id = "shape triangle">
      <button id="triangle" type="button">三角形を追加</button>
      </div>
      <button id="text" type="button">テキスト</button>

      <label class="color-tool">色
        <input id="fillColor" type="color" value="#fffff">
      </label>
      <button id="delete" type="button">削除</button>
    </aside>

    <main class="main">
      <div id="canvas"></div>
    </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
